services:

  spark:
    build: ./docker
    container_name: spark-container
    volumes:
      - ./:/app
    working_dir: /app
    command: tail -f /dev/null
    depends_on:
      - postgres

  postgres:
    image: postgres:18
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Hrhk@9090
      POSTGRES_DB: healthcare
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-ui
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: dheerajsaroha2892002@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Hrhk@9090
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata: